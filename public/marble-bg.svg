<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <!-- Procedural white + gold marble. Replace this file with the client's own marble image (keep the path /marble-bg.svg, or drop a .jpg and update Footer). -->
  <defs>
    <filter id="cloud">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="5" seed="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.82  0 0 0 0 0.82  0 0 0 0 0.83  0 0 0 0.5 0"/>
    </filter>
    <filter id="greyvein">
      <feTurbulence type="turbulence" baseFrequency="0.008 0.014" numOctaves="6" seed="9" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.43  0 0 0 0 0.45  0 0 0 -9 3.4"/>
    </filter>
    <filter id="goldvein">
      <feTurbulence type="turbulence" baseFrequency="0.006 0.011" numOctaves="5" seed="24" result="n2"/>
      <feColorMatrix in="n2" type="matrix" values="0 0 0 0 0.81  0 0 0 0 0.64  0 0 0 0 0.16  0 0 0 -12 4.4"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="#f7f5f1"/>
  <rect width="1400" height="900" filter="url(#cloud)" opacity="0.5"/>
  <rect width="1400" height="900" filter="url(#greyvein)" opacity="0.6"/>
  <rect width="1400" height="900" filter="url(#goldvein)" opacity="0.75"/>
</svg>
